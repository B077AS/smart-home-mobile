<div class="login-wrapper">
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon" id="logo-icon">
          <i class="mdi mdi-home"></i>
        </div>
        <h1>Smart Home</h1>
        <p class="logo-subtitle">Welcome back</p>
      </div>

      <div class="card">
        <div id="error-container"></div>
        <form id="login-form">
          <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username" />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password" style="padding-right: 50px" />
              <button type="button" class="input-icon" id="toggle-password">
                <i class="mdi mdi-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="submit-btn">
            <i class="mdi mdi-login"></i>
            <span>Sign In</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
